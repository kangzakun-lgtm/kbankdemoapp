<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>K Wallet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont;
}

body{
    background:#f4f5f7;
    color:#111;
}

.hidden{
    display:none !important;
}

.app{
    max-width:430px;
    margin:auto;
    min-height:100vh;
    padding-bottom:110px;
}

/* 공통 */

.page{
    animation:fade .25s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(8px);}
    to{opacity:1; transform:translateY(0);}
}

.header{
    padding:24px;
    padding-top:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:34px;
    font-weight:800;
    color:#001b6d;
}

.back{
    padding:24px 24px 0;
    font-size:18px;
    font-weight:800;
    color:#001b6d;
}

/* 로딩 */

.loading{
    position:fixed;
    inset:0;
    background:white;
    z-index:99999;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.loading.hidden{
    display:none;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid #003cff;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

.loading-text{
    margin-top:18px;
    font-weight:700;
    color:#001b6d;
}

/* 카드 */

.card{
    margin:0 20px;
    background:linear-gradient(135deg,#00104a,#00218f);
    border-radius:28px;
    padding:24px;
    color:white;
}

.account-number{
    margin-top:10px;
    opacity:.8;
}

.label{
    margin-top:34px;
    opacity:.7;
}

.balance{
    margin-top:10px;
    font-size:52px;
    font-weight:800;
}

.asset{
    margin-top:20px;
    display:inline-block;
    background:rgba(255,255,255,.1);
    padding:12px 18px;
    border-radius:999px;
}

/* 메뉴 */

.menu-grid{
    margin:24px 20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
}

.menu{
    text-align:center;
}

.menu-icon{
    width:64px;
    height:64px;
    background:white;
    border-radius:22px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:28px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.menu-name{
    margin-top:10px;
    font-size:14px;
    font-weight:700;
}

/* 배너 */

.banner-wrap{
    overflow:hidden;
    margin:0 20px;
}

.banner-track{
    display:flex;
    gap:14px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}

.banner-track::-webkit-scrollbar{
    display:none;
}

.banner{
    min-width:100%;
    background:white;
    border-radius:24px;
    padding:24px;
    scroll-snap-align:start;
}

.banner-title{
    font-size:24px;
    font-weight:800;
}

.banner-desc{
    margin-top:10px;
    color:#666;
}

/* 계좌 */

.section{
    margin:28px 20px 0;
}

.section-title{
    font-size:28px;
    font-weight:800;
    margin-bottom:16px;
}

.account-item{
    background:white;
    border-radius:22px;
    padding:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 거래내역 */

.history-header{
    padding:24px;
    padding-top:60px;
}

.history-title{
    font-size:34px;
    font-weight:800;
}

.filter-wrap{
    margin-top:18px;
    display:flex;
    gap:10px;
}

.filter{
    background:white;
    border:none;
    padding:12px 18px;
    border-radius:999px;
    font-weight:700;
}

.transaction{
    background:white;
    margin:12px 20px;
    padding:20px;
    border-radius:22px;
}

.top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.name{
    font-size:20px;
    font-weight:700;
}

.amount.plus{
    color:#2563ff;
    font-weight:800;
}

.amount.minus{
    color:#e53935;
    font-weight:800;
}

.bottom-row{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    color:#888;
    font-size:14px;
}

/* 이체 */

.transfer-box{
    background:white;
    margin:20px;
    border-radius:24px;
    padding:24px;
}

.input{
    width:100%;
    border:none;
    background:#f3f4f6;
    border-radius:16px;
    padding:18px;
    margin-top:14px;
    font-size:16px;
}

.button{
    width:100%;
    margin-top:22px;
    background:#003cff;
    color:white;
    border:none;
    padding:18px;
    border-radius:18px;
    font-size:17px;
    font-weight:800;
}

/* 전체 메뉴 */

.all-grid{
    margin:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
}

.all-item{
    background:white;
    border-radius:22px;
    padding:24px 10px;
    text-align:center;
}

.all-icon{
    font-size:32px;
}

.all-name{
    margin-top:10px;
    font-weight:700;
    font-size:14px;
}

/* 탭바 */

.tabbar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    max-width:430px;
    margin:auto;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:16px 0 28px;
    border-top:1px solid #eee;
}

.tab{
    text-align:center;
    font-size:13px;
}

.tab-icon{
    font-size:24px;
    margin-bottom:4px;
}

</style>
</head>

<body>

<!-- 로딩 -->

<div class="loading" id="loading">

    <div class="spinner"></div>

    <div class="loading-text">
        불러오는 중...
    </div>

</div>

<div class="app">

<!-- 홈 -->

<div id="homePage" class="page">

    <div class="header">
        <div class="logo">K Wallet</div>
        <div style="font-size:24px;">🔔</div>
    </div>

    <div class="card" onclick="goPage('historyPage')">

        <div style="font-size:22px; font-weight:700;">
            K Wallet 입출금통장
        </div>

        <div class="account-number">
            100-190-820242
        </div>

        <div class="label">
            사용 가능 금액
        </div>

        <div class="balance">
            233원
        </div>

        <div class="asset">
            총 자산 233원
        </div>

    </div>

    <div class="menu-grid">

        <div class="menu" onclick="goPage('transferPage')">
            <div class="menu-icon">💸</div>
            <div class="menu-name">이체</div>
        </div>

        <div class="menu">
            <div class="menu-icon">💳</div>
            <div class="menu-name">카드</div>
        </div>

        <div class="menu">
            <div class="menu-icon">🏧</div>
            <div class="menu-name">ATM출금</div>
        </div>

        <div class="menu" onclick="goPage('allPage')">
            <div class="menu-icon">☰</div>
            <div class="menu-name">전체</div>
        </div>

    </div>

    <div class="banner-wrap">

        <div class="banner-track">

            <div class="banner">
                <div class="banner-title">
                    최대 연 2.3%
                </div>

                <div class="banner-desc">
                    플러스박스 이벤트 진행중
                </div>
            </div>

            <div class="banner">
                <div class="banner-title">
                    카드 캐시백
                </div>

                <div class="banner-desc">
                    최대 5만원 혜택
                </div>
            </div>

            <div class="banner">
                <div class="banner-title">
                    해외결제 이벤트
                </div>

                <div class="banner-desc">
                    수수료 할인 진행중
                </div>
            </div>

        </div>

    </div>

</div>

<!-- 거래내역 -->

<div id="historyPage" class="hidden page">

    <div class="back" onclick="goPage('homePage')">
        ← 돌아가기
    </div>

    <div class="history-header">

        <div class="history-title">
            거래내역
        </div>

        <div class="filter-wrap">

            <button class="filter" onclick="sortLatest()">
                최신순
            </button>

            <button class="filter" onclick="sortAmount()">
                금액순
            </button>

        </div>

    </div>

    <div id="transactionList"></div>

</div>

<!-- 이체 -->

<div id="transferPage" class="hidden page">

    <div class="back" onclick="goPage('homePage')">
        ← 돌아가기
    </div>

    <div class="history-header">

        <div class="history-title">
            이체
        </div>

    </div>

    <div class="transfer-box">

        <div style="font-weight:700;">
            받는 계좌번호
        </div>

        <input class="input" placeholder="계좌번호 입력"/>

        <div style="font-weight:700; margin-top:22px;">
            금액
        </div>

        <input class="input" placeholder="금액 입력"/>

        <button class="button">
            다음
        </button>

    </div>

</div>

<!-- 전체 -->

<div id="allPage" class="hidden page">

    <div class="back" onclick="goPage('homePage')">
        ← 돌아가기
    </div>

    <div class="history-header">

        <div class="history-title">
            전체
        </div>

    </div>

    <div class="all-grid">

        <div class="all-item">
            <div class="all-icon">💰</div>
            <div class="all-name">내 자산</div>
        </div>

        <div class="all-item">
            <div class="all-icon">📈</div>
            <div class="all-name">투자</div>
        </div>

        <div class="all-item">
            <div class="all-icon">💳</div>
            <div class="all-name">카드</div>
        </div>

        <div class="all-item">
            <div class="all-icon">🏧</div>
            <div class="all-name">ATM출금</div>
        </div>

        <div class="all-item">
            <div class="all-icon">📱</div>
            <div class="all-name">모바일결제</div>
        </div>

        <div class="all-item">
            <div class="all-icon">⚙️</div>
            <div class="all-name">설정</div>
        </div>

    </div>

</div>

</div>

<!-- 탭바 -->

<div class="tabbar">

    <div class="tab">
        <div class="tab-icon">🏠</div>
        홈
    </div>

    <div class="tab">
        <div class="tab-icon">💸</div>
        이체
    </div>

    <div class="tab">
        <div class="tab-icon">📈</div>
        혜택
    </div>

    <div class="tab">
        <div class="tab-icon">☰</div>
        전체
    </div>

</div>

<script>

setTimeout(()=>{
    document.getElementById("loading").classList.add("hidden");
},1500);

const transactions = [

{
name:"SHIBATA_JIDOS",
amount:-1390322,
balance:"233원",
date:"2025.04.02"
},

{
name:"마영민",
amount:438055,
balance:"1,390,555원",
date:"2025.03.27"
},

{
name:"오택우",
amount:609000,
balance:"952,500원",
date:"2025.03.27"
},

{
name:"추헌승",
amount:343500,
balance:"343,500원",
date:"2025.03.26"
},

{
name:"SHIBATA_JIDOS",
amount:-248233,
balance:"0원",
date:"2025.03.02"
},

{
name:"사용자D",
amount:248345,
balance:"248,345원",
date:"2025.02.28"
}

];

function renderTransactions(data){

const list = document.getElementById("transactionList");

list.innerHTML = "";

data.forEach(item=>{

const plus = item.amount > 0;

list.innerHTML += `

<div class="transaction">

<div class="top-row">

<div class="name">
${item.name}
</div>

<div class="amount ${plus ? 'plus':'minus'}">
${plus ? '+' : '-'}${Math.abs(item.amount).toLocaleString()}원
</div>

</div>

<div class="bottom-row">

<div>${item.date}</div>

<div>잔액 ${item.balance}</div>

</div>

</div>

`;

});

}

renderTransactions(transactions);

function sortLatest(){
renderTransactions(transactions);
}

function sortAmount(){

const sorted = [...transactions].sort((a,b)=>
Math.abs(b.amount)-Math.abs(a.amount)
);

renderTransactions(sorted);

}

function goPage(target){

document.getElementById("loading").classList.remove("hidden");

setTimeout(()=>{

document.querySelectorAll(".page").forEach(page=>{
page.classList.add("hidden");
});

document.getElementById(target).classList.remove("hidden");

document.getElementById("loading").classList.add("hidden");

},1200);

}

</script>

</body>
</html>
