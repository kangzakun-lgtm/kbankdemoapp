<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>K Wallet</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont;
}

body{
    background:#f4f5f7;
    color:#111;
}

/* 로딩 */

.loader{
    position:fixed;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    flex-direction:column;
    transition:.4s;
}

.loader.hidden{
    opacity:0;
    pointer-events:none;
}

.loader-logo{
    font-size:42px;
    font-weight:800;
    color:#001b6d;
}

.loader-bar{
    width:120px;
    height:5px;
    background:#ddd;
    margin-top:20px;
    border-radius:999px;
    overflow:hidden;
}

.loader-fill{
    width:40%;
    height:100%;
    background:#003cff;
    border-radius:999px;
    animation:loading 1s infinite;
}

@keyframes loading{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(300%);}
}

.app{
    max-width:430px;
    margin:0 auto;
    min-height:100vh;
    padding-bottom:100px;
}

/* 헤더 */

.header{
    padding:24px;
    padding-top:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:34px;
    font-weight:800;
    color:#001b6d;
}

/* 카드 */

.card{
    margin:0 20px;
    background:linear-gradient(135deg,#00104a,#00218f);
    border-radius:28px;
    padding:24px;
    color:white;
    cursor:pointer;
}

.account-number{
    margin-top:10px;
    opacity:.8;
}

.label{
    margin-top:36px;
    opacity:.7;
}

.balance{
    margin-top:10px;
    font-size:52px;
    font-weight:800;
}

.asset{
    margin-top:20px;
    display:inline-block;
    background:rgba(255,255,255,.1);
    padding:12px 18px;
    border-radius:999px;
}

/* 메뉴 */

.menu-grid{
    margin:24px 20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
}

.menu{
    text-align:center;
}

.menu-icon{
    width:64px;
    height:64px;
    border-radius:22px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    margin:0 auto 10px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.menu-name{
    font-size:14px;
    font-weight:600;
}

/* 배너 */

.banner-wrap{
    overflow:hidden;
    margin:0 20px;
}

.banner-track{
    display:flex;
    gap:14px;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    padding-bottom:10px;
}

.banner-track::-webkit-scrollbar{
    display:none;
}

.banner{
    min-width:100%;
    background:white;
    border-radius:24px;
    padding:24px;
    scroll-snap-align:start;
}

.banner-title{
    font-size:24px;
    font-weight:800;
}

.banner-desc{
    margin-top:10px;
    color:#666;
}

/* 계좌 */

.section{
    margin:30px 20px 0;
}

.section-title{
    font-size:28px;
    font-weight:800;
    margin-bottom:16px;
}

.account-item{
    background:white;
    border-radius:22px;
    padding:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 거래내역 */

.hidden{
    display:none;
}

.history-header{
    padding:24px;
    padding-top:60px;
}

.history-title{
    font-size:34px;
    font-weight:800;
}

.filter-wrap{
    margin-top:18px;
    display:flex;
    gap:10px;
}

.filter{
    background:white;
    border:none;
    padding:12px 18px;
    border-radius:999px;
    font-weight:700;
}

.transaction{
    background:white;
    margin:12px 20px;
    padding:20px;
    border-radius:22px;
}

.top-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.name{
    font-size:20px;
    font-weight:700;
}

.amount.plus{
    color:#2563ff;
    font-weight:800;
}

.amount.minus{
    color:#e53935;
    font-weight:800;
}

.bottom-row{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    color:#888;
    font-size:14px;
}

.back{
    padding:24px 24px 0;
    color:#001b6d;
    font-weight:800;
    font-size:18px;
}

/* 하단 탭 */

.tabbar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    max-width:430px;
    margin:auto;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:16px 0 28px;
    border-top:1px solid #eee;
}

.tab{
    text-align:center;
    font-size:13px;
}

.tab-icon{
    font-size:24px;
    margin-bottom:4px;
}

</style>
</head>

<body>

<!-- 로딩 -->

<div class="loader" id="loader">
    <div class="loader-logo">K Wallet</div>

    <div class="loader-bar">
        <div class="loader-fill"></div>
    </div>
</div>

<div class="app">

<!-- 홈 -->

<div id="homePage">

    <div class="header">
        <div class="logo">K Wallet</div>
        <div style="font-size:24px;">🔔</div>
    </div>

    <div class="card" onclick="openHistory()">

        <div style="font-size:22px; font-weight:700;">
            K Wallet 입출금통장
        </div>

        <div class="account-number">
            100-190-820242
        </div>

        <div class="label">
            사용 가능 금액
        </div>

        <div class="balance">
            233원
        </div>

        <div class="asset">
            총 자산 233원
        </div>

    </div>

    <!-- 메뉴 -->

    <div class="menu-grid">

        <div class="menu" onclick="showPopup('이체 페이지 예시')">
            <div class="menu-icon">💸</div>
            <div class="menu-name">이체</div>
        </div>

        <div class="menu" onclick="showPopup('카드 관리 예시')">
            <div class="menu-icon">💳</div>
            <div class="menu-name">카드</div>
        </div>

        <div class="menu" onclick="showPopup('ATM 출금 예시')">
            <div class="menu-icon">🏧</div>
            <div class="menu-name">ATM출금</div>
        </div>

        <div class="menu" onclick="showPopup('전체 메뉴 예시')">
            <div class="menu-icon">☰</div>
            <div class="menu-name">전체</div>
        </div>

    </div>

    <!-- 홍보 배너 -->

    <div class="banner-wrap">

        <div class="banner-track">

            <div class="banner">
                <div class="banner-title">
                    최대 연 2.3%
                </div>

                <div class="banner-desc">
                    플러스박스 이벤트 진행중
                </div>
            </div>

            <div class="banner">
                <div class="banner-title">
                    카드 캐시백
                </div>

                <div class="banner-desc">
                    이번달 최대 5만원 혜택
                </div>
            </div>

            <div class="banner">
                <div class="banner-title">
                    해외결제 수수료
                </div>

                <div class="banner-desc">
                    특별 할인 이벤트
                </div>
            </div>

        </div>

    </div>

    <!-- 계좌 -->

    <div class="section">

        <div class="section-title">
            내 계좌
        </div>

        <div class="account-item">

            <div>
                <div style="font-weight:700;">
                    K Wallet 입출금통장
                </div>

                <div style="margin-top:6px; color:#888;">
                    100-190-820242
                </div>
            </div>

            <div style="font-weight:800;">
                233원
            </div>

        </div>

    </div>

</div>

<!-- 거래내역 -->

<div id="historyPage" class="hidden">

    <div class="back" onclick="goBack()">
        ← 돌아가기
    </div>

    <div class="history-header">

        <div class="history-title">
            거래내역
        </div>

        <div class="filter-wrap">

            <button class="filter" onclick="sortLatest()">
                최신순
            </button>

            <button class="filter" onclick="sortAmount()">
                금액순
            </button>

        </div>

    </div>

    <div id="transactionList"></div>

</div>

</div>

<!-- 하단 탭 -->

<div class="tabbar">

    <div class="tab">
        <div class="tab-icon">🏠</div>
        홈
    </div>

    <div class="tab">
        <div class="tab-icon">💸</div>
        이체
    </div>

    <div class="tab">
        <div class="tab-icon">📈</div>
        혜택
    </div>

    <div class="tab">
        <div class="tab-icon">☰</div>
        전체
    </div>

</div>

<script>

setTimeout(()=>{
    document.getElementById("loader").classList.add("hidden");
},1500);

const transactions = [

{
    name:"SHIBATA_JIDOS",
    amount:-1390322,
    balance:"233원",
    date:"2025.04.02"
},

{
    name:"사용자 C",
    amount:438055,
    balance:"1,390,555원",
    date:"2025.03.27"
},

{
    name:"사용자 B",
    amount:609000,
    balance:"952,500원",
    date:"2025.03.27"
},

{
    name:"사용자 A",
    amount:343500,
    balance:"343,500원",
    date:"2025.03.26"
}

];

function renderTransactions(data){

    const list = document.getElementById("transactionList");

    list.innerHTML = "";

    data.forEach(item=>{

        const plus = item.amount > 0;

        list.innerHTML += `

        <div class="transaction">

            <div class="top-row">

                <div class="name">
                    ${item.name}
                </div>

                <div class="amount ${plus ? 'plus':'minus'}">
                    ${plus ? '+' : '-'}${Math.abs(item.amount).toLocaleString()}원
                </div>

            </div>

            <div class="bottom-row">

                <div>
                    ${item.date}
                </div>

                <div>
                    잔액 ${item.balance}
                </div>

            </div>

        </div>

        `;
    });
}

renderTransactions(transactions);

function sortLatest(){
    renderTransactions(transactions);
}

function sortAmount(){

    const sorted = [...transactions].sort((a,b)=>
        Math.abs(b.amount)-Math.abs(a.amount)
    );

    renderTransactions(sorted);
}

function openHistory(){

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("historyPage").classList.remove("hidden");
}

function goBack(){

    document.getElementById("historyPage").classList.add("hidden");
    document.getElementById("homePage").classList.remove("hidden");
}

function showPopup(text){
    alert(text);
}

</script>

</body>
	</html>
